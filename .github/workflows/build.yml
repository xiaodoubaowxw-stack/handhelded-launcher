name: Build & Release

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Clone QiangQiang Framework
        run: |
          git clone --depth 1 --branch main https://github.com/kobolingfeng/qiangqiang.git temp_qiangqiang
      
      - name: Install QiangQiang Dependencies
        run: |
          cd temp_qiangqiang
          ~/.bun/bin/bun.exe install
          ~/.bun/bin/bun.exe scripts/setup.ts
      
      - name: Copy Project Files
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          
          # 复制 src 目录下的所有文件
          Copy-Item -Path "src" -Destination "temp_qiangqiang\src" -Recurse -Force
          Copy-Item -Path "app.config.json" -Destination "temp_qiangqiang\app.config.json" -Force
      
      - name: Build Frontend
        run: |
          cd temp_qiangqiang
          ~/.bun/bin/bun.exe scripts/build.ts --frontend-only
      
      - name: Build Native
        run: |
          cd temp_qiangqiang
          ~/.bun/bin/bun.exe scripts/build.ts --native-only
          ~/.bun/bin/bun.exe scripts/build.ts --single-exe
      
      - name: Prepare Output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          if (Test-Path "temp_qiangqiang\dist\app.exe") {
              Copy-Item "temp_qiangqiang\dist\app.exe" "dist\QiangQiangGameLauncher.exe"
          }
          if (Test-Path "temp_qiangqiang\dist\强强-portable.zip") {
              Copy-Item "temp_qiangqiang\dist\强强-portable.zip" "dist\QiangQiangGameLauncher-portable.zip"
          }
      
      - name: Upload Release Assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: QiangQiangGameLauncher
          path: |
            dist/*
